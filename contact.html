<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aura Fit - Contact</title>
<style>

body {
    font-family:" Times New Roman";
    background: #0f0f0f;
    color: white;
    margin: 0;
    padding: 20px;
}


.title {
    text-align: center;
    color: #c8a96a;
    margin-bottom: 30px;
}


.contact-container {
    display: flex;
    gap: 40px;
    max-width: 1100px;
    margin: auto;
    flex-wrap: wrap;
}


.contact-form {
    flex: 1;
    background: #1a1a1a;
    padding: 30px;
    border-radius: 10px;
    border: 1px solid #c8a96a;
}

label {
    display: block;
    margin-top: 15px;
    font-weight: bold;
}

input, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border: 1px solid #555;
    border-radius: 5px;
    background: #111;
    color: white;
}

input:focus, textarea:focus {
    outline: none;
    border-color: #c8a96a;
    box-shadow: 0 0 5px #c8a96a;
}

button {
    margin-top: 20px;
    width: 100%;
    padding: 12px;
    background: #c8a96a;
    border: none;
    border-radius: 25px;
    font-weight: bold;
    cursor: pointer;
    color: black;
}

button:hover {
    background: #e3c07a;
}


.contact-info {
    flex: 1;
    background: #1a1a1a;
    padding: 30px;
    border-radius: 10px;
    border: 1px solid #c8a96a;
}

.contact-info h2 {
    color: #c8a96a;
    margin-top: 0;
}

.contact-info address {
    font-style: normal;
    line-height: 1.6;
}

.contact-info a {
    color: #c8a96a;
    text-decoration: none;
}

.contact-info a:hover {
    text-decoration: underline;
}


table {
    width: 100%;
    margin-top: 20px;
    border-collapse: collapse;
}

th, td {
    padding: 10px;
    border: 1px solid #444;
    text-align: left;
}

th {
    color: #c8a96a;
}

tbody tr:nth-child(even) {
    background: #1a1a1a;
}

tbody tr:hover {
    background: #2a2a2a;
}

@media(max-width: 768px){
    .contact-container {
        flex-direction: column;
    }
}
</style>
</head>
<body>

<h1 class="title">Contact Us</h1>

<div class="contact-container">

 
    <div class="contact-form">
        <form action="#" method="post">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" placeholder="Your name" required>

            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="Your Email" required>

            <label for="subject">Subject</label>
            <input type="text" id="subject" name="subject" placeholder="Subject" required>

            <label for="message">Message</label>
            <textarea id="message" name="message" rows="5" placeholder="Your message..." required></textarea>

            <button type="submit">Send Message</button>
        </form>
    </div>


    <div class="contact-info">
        <address>
            <strong>Aura Fit</strong><br>
            UV5 ext NUM 777, Nouvelle ville, Constantine<br>
            Phone: <a href="tel:+213659143339">0659143339</a><br>
            Email: <a href="mailto:Aura@gym.com">Aura@gym.com</a>
        </address>

        <h2>Opening Hours</h2>
        <table>
            <thead>
                <tr>
                    <th>Day</th>
                    <th>Opening Hours</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Sunday - Thursday</td>
                    <td>5:00 AM - 9:00 PM</td>
                </tr>
                <tr>
                    <td>Saturday</td>
                    <td>9:00 AM - 9:00 PM</td>
                </tr>
                <tr>
                    <td>Friday</td>
                    <td>10:00 AM - 9:00 PM</td>
                </tr>
            </tbody>
        </table>
    </div>

</div>

</body>
</html>
